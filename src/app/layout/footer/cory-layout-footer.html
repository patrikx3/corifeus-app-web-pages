
@if (parent.packageJson !== undefined) {
  <footer class="cory-mat-footer" role="contentinfo" aria-label="Site footer">
    <mat-toolbar class="cory-layout-menus" color="primary">
      <span class="cory-layout-footer-container">
        @if (parent.packageJson.corifeus.publish === true) {
          <a mat-button [href]="linkNpm" target="_blank" rel="noopener"
            [matTooltip]="tooltip.Npm" matTooltipPosition="above" class="cory-hover-scale"
            style="position: relative; top: 2px"
            [attr.aria-label]="'View ' + parent.packageJson.name + ' on NPM'">
            <img src="/assets/npm-logo.svg" alt="NPM package" style="width: auto; height: 20px; min-height: 20px; min-width: 51px"/>
          </a>
        }
        <a mat-button [href]="linkGithub" target="_blank" rel="noopener" [matTooltip]="tooltip.GitHub"
          matTooltipPosition="above" class="cory-pages-menu-effect"
          [attr.aria-label]="'View ' + parent.currentRepo + ' on GitHub'">
          <i class="fab fa-github cory-layout-fa" aria-hidden="true"></i>
          <span class="cory-mat-hide-xsmall" style="position: relative; top: -2px">
            GitHub
          </span>
        </a>
      </span>
      <span class="cory-mat-fill-horizontal"></span>
      <span class="cory-layout-footer-container">
        <cory-mat-theme-button class="cory-pages-menu-effect"></cory-mat-theme-button>
        <a mat-button [href]="linkDeveloper" class="cory-pages-footer-shrink-icon cory-pages-menu-effect"
          target="_blank" rel="noopener" [matTooltip]="tooltip.Developer" matTooltipPosition="left"
          aria-label="Developer website - Patrik Laszlo">
          <mat-icon aria-hidden="true">flash_on</mat-icon>
          <span class="cory-mat-hide-xsmall cory-pages-footer-shrink-text">
            <span [innerHTML]="decodeEntities(i18n.pages.title.developer)"></span> {{ currentYear }}
          </span>
        </a>
      </span>
    </mat-toolbar>
  </footer>
}
